name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install project tools
        uses: jdx/mise-action@v4

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: gates-${{ hashFiles('.mise.toml', '.config/mise/conf.d/batten.toml', 'Cargo.lock') }}
          restore-keys: |
            gates-

      - name: Run project gates
        run: mise run check

      - name: Run database integration tests
        run: mise run test-db

      - name: Stop database services
        if: always()
        run: mise exec -- just db-down
