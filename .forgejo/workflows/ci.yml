name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gates:
    runs-on: codeberg-medium
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Trust the checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install project tools
        uses: https://github.com/jdx/mise-action@v4
        with:
          github_token: ""

      - name: Cache cargo registry and build artifacts
        uses: https://code.forgejo.org/actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: gates-${{ hashFiles('.mise.toml', '.config/mise/conf.d/batten.toml', 'Cargo.lock') }}
          restore-keys: |
            gates-

      - name: Run project gates
        run: mise run check

      - name: Run database integration tests
        run: mise run test-db

      - name: Stop database services
        if: always()
        run: mise exec -- just db-down
