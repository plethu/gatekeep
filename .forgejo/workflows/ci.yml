name: ci

env:
  # Keep this aligned with `rust-version` in the workspace Cargo.toml so MSRV
  # drift fails loudly in CI and local development.
  RUST_VERSION: "1.96.0"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gates:
    runs-on: docker
    container:
      image: node:24-bookworm
    services:
      postgres:
        image: postgres:17.6-alpine
        env:
          POSTGRES_DB: gatekeep
          POSTGRES_PASSWORD: gatekeep
          POSTGRES_USER: gatekeep
        options: >-
          --health-cmd "pg_isready -U gatekeep -d gatekeep"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Trust the checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain "$RUST_VERSION" \
                --component rustfmt --component clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustc" --version

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: gates-rust-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            gates-rust-${{ env.RUST_VERSION }}-

      - name: Run project gates
        run: make check

      - name: Run Postgres lowering tests
        run: TEST_DB_UP=0 DATABASE_URL=postgres://gatekeep:gatekeep@postgres:5432/gatekeep make test-db
