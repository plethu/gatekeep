services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: gatekeep
      POSTGRES_USER: gatekeep
      POSTGRES_PASSWORD: gatekeep
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatekeep -d gatekeep"]
      interval: 2s
      timeout: 2s
      retries: 20
