services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: gatekeep
      POSTGRES_USER: gatekeep
      POSTGRES_PASSWORD: gatekeep
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatekeep -d gatekeep"]
      interval: 2s
      timeout: 2s
      retries: 20
  mysql:
    image: mysql:9.5
    environment:
      MYSQL_DATABASE: gatekeep
      MYSQL_USER: gatekeep
      MYSQL_PASSWORD: gatekeep
      MYSQL_ROOT_PASSWORD: gatekeep_root
    ports:
      - "53306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ugatekeep -pgatekeep --silent"]
      interval: 2s
      timeout: 2s
      retries: 30
